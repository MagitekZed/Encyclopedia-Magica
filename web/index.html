<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Encyclopedia Magica — Astral Roller</title>
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<canvas id="sky"></canvas>
<div class="aurora" aria-hidden="true"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>
<div class="vignette" aria-hidden="true"></div>

<div id="splash" class="splash" role="status" aria-label="Loading">
  <div class="aperture"></div>
  <div class="cap">Opening the aperture…</div>
</div>

<div class="app">
  <header class="header" role="banner">
    <div class="wordmark"><span class="dropcap">✦</span><span class="wm-text">Encyclopedia&nbsp;Magica</span></div>
    <button class="btn btn-primary" id="hdrRandom" aria-keyshortcuts="R"
      data-tip="Roll a random item" data-tip-sub="Any table, any fate — one press." data-tip-kbd="R"><span class="reticle">✦</span><span class="hdr-label"> Random Item</span></button>
    <span class="spacer"></span>
    <div class="seedbox">
      <span class="seed-label">seed</span>
      <input id="seed" type="text" inputmode="numeric" placeholder="—" aria-label="Seed" autocomplete="off"
        data-tip="Seed" data-tip-sub="The number that shaped this roll — type one and lock it to revisit.">
      <button id="lock" class="lock" aria-label="Lock seed" aria-pressed="false" data-tip-live
        data-tip="Seed · unlocked" data-tip-sub="Each roll draws a fresh seed — press to replay the one above.">🔒</button>
      <span id="count" class="count" data-tip="Roll counter"
        data-tip-sub="Rolls made this session — echoed in each result's seed line.">#0</span>
    </div>
    <span class="hdr-sep" aria-hidden="true"></span>
    <div class="hdr-group" role="group" aria-label="Session preferences">
      <button class="btn-icon" id="sound" aria-label="Sound" aria-pressed="false" data-tip-live
        data-tip="Sound · off" data-tip-sub="Dice clicks and chimes are silenced — press to wake them.">♪</button>
      <button class="btn-icon wide" id="ritual" aria-label="Casting: ritual" data-tip-live
        data-tip="Casting · ritual" data-tip-sub="Full dice-cast ceremony on every roll — press for instant results.">ritual</button>
      <button class="btn-icon wide" id="reduce" aria-label="Reduce effects" aria-pressed="false" data-tip-live
        data-tip="Effects · full" data-tip-sub="Starfield motion and glow at full strength — press to calm.">effects</button>
    </div>
    <span class="hdr-sep" aria-hidden="true"></span>
    <div class="hdr-group" role="group" aria-label="Tools">
      <button class="btn-icon wide" id="cmdk" aria-keyshortcuts="Control+K Meta+K"
        data-tip="Command palette" data-tip-sub="Search every action, table, and artifact power." data-tip-kbd="Mod K">⌘K</button>
      <button class="btn-icon" id="diag" aria-label="Diagnostics"
        data-tip="Diagnostics" data-tip-sub="Run the self-test and review data warnings.">⚙</button>
      <button class="btn-icon" id="more" aria-label="More options"
        data-tip="More options" data-tip-sub="The full menu — everything the small screen hides.">⋯</button>
      <button class="btn-icon" id="grim" aria-label="Grimoire" aria-controls="grimoire" aria-expanded="false"
        aria-keyshortcuts="Control+H Meta+H" data-tip-live
        data-tip="Grimoire · open" data-tip-sub="Your roll history — pin the finds worth keeping." data-tip-kbd="Mod H">☰</button>
    </div>
  </header>

  <nav class="tabrail" role="tablist" aria-label="Roller sections">
    <button class="tab active" role="tab" aria-selected="true" data-tab="random">Random</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="single">Single Table</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="artifacts">Artifacts</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="library">Library</button>
    <span class="tab-arc" id="tabArc" aria-hidden="true"></span>
  </nav>

  <main class="body" id="main" tabindex="-1">
    <section class="tabpanel active" role="tabpanel" data-panel="random" id="panelRandom"></section>
    <section class="tabpanel" role="tabpanel" data-panel="single" id="panelSingle"></section>
    <section class="tabpanel" role="tabpanel" data-panel="artifacts" id="panelArtifacts"></section>
    <section class="tabpanel" role="tabpanel" data-panel="library" id="panelLibrary"></section>
  </main>

  <div class="grim-scrim" id="grimScrim" aria-hidden="true"></div>
  <aside class="grimoire" id="grimoire" aria-label="Roll history"></aside>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="data.js"></script>
<script src="js/ranges.js"></script>
<script src="js/rng.js"></script>
<script src="js/format.js"></script>
<script src="js/dataset.js"></script>
<script src="js/engine.js"></script>
<script src="js/selftest.js"></script>
<script src="ui/sky.js"></script>
<script src="ui/audio.js"></script>
<script src="ui/widgets.js"></script>
<script src="ui/tooltip.js"></script>
<script src="ui/result.js"></script>
<script src="ui/history.js"></script>
<script src="ui/library.js"></script>
<script src="ui/tabs.js"></script>
<script src="ui/controller.js"></script>
<script src="ui/app.js"></script>
</body>
</html>
